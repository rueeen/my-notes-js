<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post-it Notes Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="app" class="app-shell"></div>

  <div class="modal fade" id="noteModal" tabindex="-1" aria-labelledby="noteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-secondary-subtle">
          <h2 class="modal-title fs-4" id="noteModalLabel">Crear nueva nota</h2>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <form id="noteForm">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label" for="noteTitle">Título</label>
              <input class="form-control" id="noteTitle" type="text" maxlength="80" placeholder="Ej. Ideas para el proyecto" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="noteDescription">Descripción</label>
              <textarea class="form-control" id="noteDescription" rows="5" maxlength="700" placeholder="Escribe el detalle de tu nota..." required></textarea>
            </div>
            <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
              <div>
                <label class="form-check-label fw-semibold" for="noteImportant">Importante</label>
                <div class="small text-white-50">Activa el color rojo vibrante.</div>
              </div>
              <div class="form-check form-switch fs-4 m-0">
                <input class="form-check-input" id="noteImportant" type="checkbox" role="switch">
              </div>
            </div>
            <div id="notePreview" class="preview-note normal p-3">
              <strong>Preview:</strong> esta nota se verá amarilla si no es importante.
            </div>
          </div>
          <div class="modal-footer border-secondary-subtle">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-gradient">Guardar nota</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
